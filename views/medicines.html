
<div ng-controller="medicineCtrl">

    <div class="row mb-3">

        <div class="col-md-8">
            <input 
                type="text"
                class="form-control"
                placeholder="Search medicine..."
                ng-model="searchText">
        </div>

        <div class="col-md-4 text-end">
            <a href="#!/invoices" class="btn btn-primary" ng-if="!isAdmin()">
                🛒 Cart
                <span class="badge bg-light text-dark">
                    {{invoiceService.getCartCount()}}
                </span>
            </a>

            <button class="btn btn-primary" ng-if="isAdmin()" ng-click="openAddMedicine()">
                Add Medicine
            </button>
    </div>

</div>


    <div class="row">

        <div class="col-md-3 mb-4"
            ng-repeat="medicine in medicines | filter:searchText">

            <div class="card h-100 shadow-sm">

                <img ng-src="{{medicine.image_url}}"
                    class="card-img-top"
                    style="height:200px; object-fit:cover;">
                <div class="card-body">

                    <h5 class="card-title">
                        {{medicine.name}}
                    </h5>

                    <p class="text-muted">
                        Price: ${{medicine.price}}
                    </p>

                    <p>
                        Stock: {{medicine.stock}}
                    </p>

                    <button class="btn btn-success w-100" ng-click="addToCart(medicine)" ng-if="!isAdmin()">
                        Add To Cart
                    </button>

                    <div class="d-flex gap-2">
                        <button class="btn btn-warning w-50" ng-click="openEditMedicine(medicine)" ng-if="isAdmin()">
                            Edit
                        </button>
                        <button class="btn btn-danger w-50" ng-click="deleteMedicine(medicine.id)" ng-if="isAdmin()">
                            Delete
                        </button>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <div class="modal fade" id="medicineModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">{{modalTitle}}</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-2">
                        <label>Image URL</label>
                        <input type="text"
                            class="form-control"
                            ng-model="modalMedicine.image_url">
                    </div>

                    <div class="mb-2">
                        <label>Name</label>
                        <input type="text"
                            class="form-control"
                            ng-model="modalMedicine.name">
                    </div>

                    <div class="mb-2">
                        <label>Price</label>
                        <input type="number"
                            class="form-control"
                            ng-model="modalMedicine.price">
                    </div>

                    <div class="mb-2">
                        <label>Stock</label>
                        <input type="number"
                            class="form-control"
                            ng-model="modalMedicine.stock">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success"
                            ng-click="saveMedicine()">
                        Save
                    </button>
                </div>

            </div>
        </div>
    </div>


</div>
