<!DOCTYPE html>
<html lang="en" ng-app="pharmacyApp">
<head>
    <meta charset="UTF-8">
    <title>Pharmacy Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>

    <script src="app.js"></script>

    <script src="services/medicineService.js"></script>
    <script src="services/customerService.js"></script>
    <script src="services/invoiceService.js"></script>
    
    <script src="controllers/mainController.js"></script>
    <script src="controllers/loginController.js"></script>
    <script src="controllers/dashboardController.js"></script>
    <script src="controllers/medicinesController.js"></script>
    <script src="controllers/addEditCustomerController.js"></script>
    <script src="controllers/invoicesController.js"></script>
    <script src="controllers/homeController.js"></script>
    <script src="controllers/signupController.js"></script>
</head>

<body ng-controller="mainCtrl">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">

            <a class="navbar-brand" href="#!/home">
            💊 MediCare Pharmacy
            </a>
            <li style="list-style-type: none;" ng-if="isLoggedIn && userRole === 'user'">
                        <span class="navbar-text text-white">
                            Welcome, <b>{{userName}}</b>
                        </span>
                    </li>

            <li style="list-style-type: none;" ng-if="isLoggedIn && userRole === 'admin'">
                        <span class="navbar-text text-warning">
                            Welcome <b>Admin</b>
                        </span>
            </li>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                    <a class="nav-link" href="#!/home">Home</a>
                    </li>
                    <li class="nav-item" ng-if="userRole === 'admin'">
                    <a class="nav-link" href="#!/dashboard">Dashboard</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="#!/medicines">Medicines</a>
                    </li>
                    <li class="nav-item" ng-if="!isLoggedIn">
                        <a class="nav-link" href="#!/signup">
                            Signup
                        </a>
                    </li>
                    <li class="nav-item" ng-if="!isLoggedIn">
                        <a class="nav-link" href="#!/login">
                            Login
                        </a>
                    </li>

                    
                    

                    <li class="nav-item" ng-if="userRole === 'admin'">
                    <a class="nav-link" href="#!/invoices">Invoices</a>
                    </li>
                    
                    <li class="nav-item" ng-if="userRole === 'admin'">
                        <a class="nav-link" href="#!/add-edit-customer">
                            Manage Customers
                        </a>
                    </li>

                    <!-- LOGOUT -->
                    <li class="nav-item" ng-if="isLoggedIn">
                        <button class="btn btn-danger ms-3"
                                ng-click="logout()">
                        Logout
                        </button>
                    </li>

                </ul>
                <!--<a ng-if="isLoggedIn" href="#!/invoices" class="btn btn-warning position-relative">
                                    🛒 Cart
                                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                        {{invoiceService.getCartCount()}}
                                    </span>
                </a>-->
            </div>
        </div>
    </nav>

    

    <div class="container mt-4">
        <div ng-view>
            
        </div>
    </div>

    
<div class="footer">
MediCare Pharmacy System © 2026
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
